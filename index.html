<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Genesis Arc</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: #fff;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  padding: 20px 40px;
}

.logo img {
  height: 64px;
  margin-right: 20px;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
}

/* TITLE */
.title {
  margin-left: 5ch;
}

/* IMAGE SECTION */
.mountain-wrap {
  position: relative;
  margin-top: 40px;
}

.arc-image {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 12px;
}

/* FOOTER TEXT */
.footer-text {
  margin-top: 40px;
  display: flex;
  justify-content: space-between;
  gap: 20px;
}

.card {
  max-width: 48%;
}

.card h3 {
  color: #d4af37;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <img src="./JR%20LOGO%20white.png" alt="Jon Ryley">
  </div>
</div>

<!-- CONTENT -->
<div class="container">

<h1 class="title">Genesis Arc</h1>
<p class="title">The Gated Business Lifecycle</p>

<!-- IMAGE REPLACEMENT -->
<div class="mountain-wrap">
  <img src="./Genesis-arc.png" alt="Genesis Arc Lifecycle" class="arc-image">
</div>

<!-- BOTTOM TEXT -->
<div class="footer-text">

  <div class="card">
    <h3>Core Principle</h3>
    <p>Gates create truth. Truth creates growth.</p>
  </div>

  <div class="card">
    <h3>Jon Ryley Lens</h3>
    <p>Scaling mountains taught patience. Scaling sales demanded structure.</p>
  </div>

</div>

</div>

</body>
</html>
